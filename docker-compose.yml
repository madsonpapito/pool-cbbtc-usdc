services:
  streamlit:
    build: .
    container_name: pool-tracker-app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - RPC_URL=${RPC_URL:-https://mainnet.base.org}
    restart: always

  sync:
    build: .
    container_name: pool-tracker-sync
    volumes:
      - .:/app
    environment:
      - RPC_URL=${RPC_URL:-https://mainnet.base.org}
    entrypoint: ["/bin/sh", "-c", "while true; do python tools/sync.py; sleep 3600; done"]
    restart: always
